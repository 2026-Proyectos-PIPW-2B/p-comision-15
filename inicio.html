<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <title>Document</title>
</head>

<body>
    <div class="px-4 pt-5 my-5 text-center border-bottom">
        <h1 class="display-4 fw-bold text-body-emphasis">PIPELECTRONICS</h1>
        <div class="col-lg-6 mx-auto">
            <p class="lead mb-4 fw-bold">
                Ofrecemos el mejor catalogo del mercado. ¿Que esperas para
                comprobarlo?
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-5">
                <div id="carouselExampleFade" class="carousel slide carousel-fade" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active" data-bs-interval="2000">
                            <img src="img/monitor.png" style="width: 500px;" class="d-block w-100 rounded" alt="..." />
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img src="img/pipw-logo-prueba.png" style="width: 500px;" class="d-block w-100 rounded"
                                alt="..." />
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img src="img/phones.jpg" style="width: 500px;" class="d-block w-100 rounded" alt="..." />
                            <div class="carousel-caption d-none d-md-block"></div>
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="px-4 pt-4 my-5 col">
                <img src="img/Apple-logo.png" alt="" style="width: 50px; height: 60px;" class="rounded mx-auto d-block">
                
            </div>
            <div class="px-4 pt-4 my-5 col">
                <img src="img/Asus-Logo.png" alt="" style="width: 60px; height: 60px;" class="rounded mx-auto d-block">
            </div>
            <div class="px-4 pt-4 my-5 col">
                <img src="img/Nvidia-logo.png" alt="" style="width: 90px; height: 60px;" class="rounded mx-auto d-block">
            </div>
                    
            <div class="px-4 pt-4 my-5 col">
                <img src="img/Samsung-Logo.png" alt="" style="width: 70px; height: 60px;" class="rounded mx-auto d-block">
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
