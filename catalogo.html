<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Catalogo</title>
  </head>

  <body class="d-flex flex-column min-vh-100 color-fondo-gris">
    <div class="container-fluid p-0">
      <div class="col">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container-fluid mx-3">
          <a
            class="logo navbar-brand color-principal fw-bold"
            href="index.html"
          >
            PipElectronics
          </a>

               <button class="btn fondo-boton d-md-none"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#barraBusqueda"
                  aria-expanded="false" aria-controls="barraBusqueda">
                <i class="bi bi-search"></i>
          </button>

         <form class="col-4 col-sm-5 cold-md-6 align-self-center d-none  d-md-block" >
            <input
              type="search"
              class="form-control form-control-dark text-bg-white text-center"
              placeholder="Ingrese el nombre del producto para buscarlo"
              aria-label="Search"
              id="inputFiltroDescripcion"
            />
          </form>

         <div class="align-items-end">        
              <span id="iconoDesconexion"><button type="button" class="boton-link btn color-principal" id="botonDesconexion"><i class="bi bi-person-fill-x"></i></button></span>
                        <span id="iconoConexion">
              <button
              class="boton-link btn color-principal"
              type="button"
              data-bs-toggle="modal"
              data-bs-target="#modalLogin"
            >
              <i class="bi bi-person-circle"></i>
            </button></span>

              <button 
                type="button"
                class="boton-link btn color-principal"
                id="botonCarrito"
                data-bs-toggle="modal"
                data-bs-target="#modalLogin">
                <i class="bi bi-cart"></i>
              </button>
            </a>
          </div>

        </div>
      </nav>

            <div class="collapse d-md-none mb-2 mt-0" id="barraBusqueda">
            <form class="d-flex ">
             <input class=" text-center bg-dark text-white border-0 rounded-0 container-fluid p-3"
                type="search"
                placeholder="Ingrese el nombre del producto para buscarlo"
                aria-label="Search"
                 id="inputFiltroDescripcionMobile">
            </form>
          </div>
      </div>

      <div class="container">
        <div
          class="modal fade"
          id="modalLogin"
          tabindex="-1"
          aria-labelledby="exampleModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content rounded-4 shadow">
              <div class="modal-header p-5 pb-4 border-bottom-0">
                <h1 class="fw-bold mb-0 fs-2">Iniciar Sesion</h1>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body p-5 pt-0">
                <form class="">
                  <div class="form-floating mb-3">
                    <input
                      type="text"
                      class="form-control rounded-3"
                      id="FloatInputNombre"
                      placeholder="Usuario1"
                    />
                    <label for="floatingInput">Nombre de usuario</label>
                  </div>
                  <div class="form-floating mb-3">
                    <input
                      type="password"
                      class="form-control rounded-3"
                      id="FloatInputContraseña"
                      placeholder="Password"
                    />
                    <label for="floatingPassword">Contraseña</label>
                  </div>

                  <button
                    class="w-100 mb-2 btn btn-lg rounded-3 fondo-boton"
                    id="botonSesion"
                    type="button"
                  >
                    Conectarse
                  </button>
                  <div class="floating-input mb-3" id="mensajesError"></div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="container navbar column px-4 d-md-none w-50 align-self-center mt-2 row rounded-4 bg-dark ">
        <button
          class="btn btn-toggle color-principal boton-link  align-items-center rounded border-0 bg-dark"
          data-bs-toggle="collapse"
          data-bs-target="#categorias-collapse-lite"
          aria-expanded="true"
        >
          Categorias
        </button>
        <div id="categorias-collapse-lite" class="collapse">
          <ul class="nav nav-pills flex-column  mb-auto bg-dark text-center " id="categoriasLite" >         
          </ul>
        </div>
    </div>

    <main class="container-fluid mx-auto flex-grow-1 p-0 d-flex flex-row">
      <div
        class="text-bg-dark p-3 h-auto d-md-block d-none"
        style="width: 15rem"
        id=""
      >
        <button
          class="btn btn-toggle color-principal d-inline-flex boton-link align-items-center rounded border-0"
          data-bs-toggle="collapse"
          data-bs-target="#categorias-collapse"
          aria-expanded="true"
        >
          Categorias
        </button>

        <div id="categorias-collapse" class="collapse">
          <ul class="nav nav-pills flex-column mt-3 mb-auto " id="categoriasproductos" >  
          </ul>
        </div>

        
      </div>

      <div
        class="container mx-auto row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 px-5 justify-content-center justify-content-sm-start mx-0 g-3 g-lg-5 color-fondo-gris"
        id="muestraProductos">
      </div>
    </main>

    <footer id="footer" class="color-fondo text-white py-4 px-4 px-md-0">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-4 mb-3 d-flex flex-column align-items-md-center">
            <div class="text-start">
              <h5>PipElectronics</h5>

              <p>La tienda electronica mas completa del pais</p>
            </div>
          </div>

          <div class="col-md-4 mb-3 d-flex flex-column align-items-md-center">
            <div class="text-start">
              <h5>Links</h5>

              <ul class="list-unstyled">
                <li>
                  <a href="index.html" class="text-white text-decoration-none"
                    >Inicio</a
                  >
                </li>
                <li>
                  <a
                    href="catalogo.html"
                    class="text-white text-decoration-none"
                    >Productos</a
                  >
                </li>
              </ul>
            </div>
          </div>

          <div class="col-md-4 d-flex flex-column align-items-md-center">
            <div class="text-start">
              <h5>Redes</h5>

              <div class="d-flex gap-3 justify-content-md-start">
                <i class="bi bi-instagram fs-4"></i>
                <i class="bi bi-facebook fs-4"></i>
                <i class="bi bi-twitter-x fs-4"></i>
              </div>
            </div>
          </div>
        </div>

        <hr />

        <p class="text-center mb-0">© 2026 PipElectronics</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script> 
    <script type="module" src="js/catalogo.js"></script>
  </body>
</html>
