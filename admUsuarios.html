<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>administrador</title>
  </head>

  <body class="d-flex flex-column min-vh-100 color-marcas">
    <div class="container-fluid p-0">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container-fluid ">
          <div class="mx-auto">
            <a
              class="boton-link nav-link color-fuente-primario fw-bold font-size-2"
              href="admProductos.html"
              >Administracion de los productos</a
            >
          </div>
        </div>
      </nav>
    </div>

    <main class="container flex-grow-1">
      <div class="w-50 mx-auto my-5">
          <button class="w-100 mb-2 btn btn-lg rounded-3 fondo-boton" type="submit" id="botonCrearUsuarios" data-bs-toggle="modal" data-bs-target="#crearUsuarios">
            Crear Usuario
          </button>
      </div>
    
    <div class="container">
        <div class="modal fade" id="CrearUsuario" tabindex="-1" aria-labelledby="CrearUsuario" aria-hidden="true">
       <div class="modal-dialog">
            <div class="modal-content rounded-4 shadow">
              <div class="modal-header p-5 pb-4 border-bottom-0">
                 <h1 class="card-title text-center mb-4 colorTexto">
                  Crear usuarios
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" ></button>
                </div>
                 <div class="modal-body p-5 pt-0">
                                  <form id="formRegistro">
                  <div class="mb-3">
                    <label for="userInput">Nombre de usuario</label>
                    <input
                      type="text"
                      class="form-control rounded-3"
                      placeholder="Debe tener mas de 4 letras"
                      id="inputCrearNombre"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="usarPassword">Contraseña</label>
                    <input
                      type="password"
                      class="form-control rounded-3"
                      id="inputCrearContraseña"
                      placeholder="Debe tener entre 4 a 8 caracteres"
                    />
                  </div>
                  <div class="row text-center">
                    <div class="mb-3 col-6">
                      <label for="inputEstado">Estado del usuario</label>
                      <select name="categoria" id="inputEstado">
                        <option value="seleccionar" disabled selected>
                          Seleccione un estado
                        </option>
                        <option value="habilitado">Habilitado</option>
                        <option value="deshabilitado">Deshabilitado</option>
                      </select>
                    </div>
                    <div class="mb-3 col-6">
                      <label for="inputRol">Rol del usuario</label>
                      <select name="categoria" id="inputRol">
                        <option value="seleccionar" disabled selected>
                          Seleccione una opcion
                        </option>
                        <option value="admin">administrador</option>
                        <option value="usuario">Usuario final</option>
                      </select>
                    </div>
                  </div>
                  <div class="mb-3">
                    <button
                      class="w-100 mb-2 btn btn-lg rounded-3 fondo-boton"
                      type="submit"
                      id="botonValidar"
                    >
                      Crear Usuario
                    </button>
                  </div>
                   <div id="divValidacion"></div>
                </form>
    </div>
    </div>
    </div>
    </div>

    <div class="container color-fondo-gris">
        <h2 class="color-principal">Listado de usuarios</h2>
        <div class="table-responsive">
          <table class="table table-bordered table-striped">
            <thead>
              <tr>
                <th id="nombresUsuarios">Nombre</th>
                <th>Contraseña</th>
                <th>Estado</th>
                <th>rol</th>
                <th>habilitar</th>
                <th>deshabilitar</th>
                <th>Editar</th>
              </tr>
            </thead>
            <tbody id="bodyTabla"></tbody>
          </table>
        </div>
    </div>
      
    <div class="container">
        <div class="modal fade" id="editarUsuario" tabindex="-1" aria-labelledby="editarUsuario" aria-hidden="true" >
          <div class="modal-dialog">
            <div class="modal-content rounded-4 shadow">
              <div class="modal-header p-5 pb-4 border-bottom-0">
                <h1 class="fw-bold mb-0 fs-2">Editar usuario</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" ></button>
              </div>

              <div class="modal-body p-5 pt-0">
                   <form id="formRegistro" class="row justify-content-between">
                        <div class="mb-3">
                            <label for="inputEditarNombre">Nombre del Producto</label>
                            <input type="text" class="form-control rounded-3" id="inputEditarNombre">
                        </div>
                         <div class="mb-3">
                            <label for="inputEditarContraseña">Nueva contraseña</label>
                            <input type="password" name="cantStock" id="inputEditarContraseña"
                                class="form-control rounded-3">
                        </div>
                        <div class="mb-3 col-6">
                            <label for="inputEditarEstado" class="form-label">Cambiar categoria</label>
                            <select id="inputEditarEstado" class="form-select">
                                <option value="">Seleccionar</option>
                                <option value="habilitado">Habilitado</option>
                                <option value="deshabilitado">Deshabilitado</option>
                            </select>
                        </div>
                          <div class="mb-3 col-6">
                            <label for="inputEditarRol" class="form-label">Cambiar rol</label>
                            <select id="inputEditarRol" class="form-select">
                                <option value="">Seleccionar</option>
                                <option value="admin">Administrador</option>
                                <option value="usuario">Usuario</option>
                            </select>
                        </div>                                              
                        <div class="mb-3">
                            <button class="w-100 mb-2 btn btn-lg rounded-3 text-white fondo-boton"
                                type="submit" id="botonEditarUsuarios" >Editar Usuario</button>
                        </div>
                    </form>
              </div>

            </div>
          </div>
        </div>
      </div>

    </main>
    <footer id="footer" class="color-fondo text-white py-4">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-4 mb-3">
            <h5>PipElectronics</h5>
            <p>La tienda electronica mas completa del pais</p>
          </div>
          <div class="col-md-4 mb-3">
            <h5>Links</h5>
            <ul class="list-unstyled">
              <li>
                <a href="index.html" class="text-white text-decoration-none"
                  >Inicio</a
                >
              </li>
              <li>
                <a href="catalogo.html" class="text-white text-decoration-none"
                  >Productos</a
                >
              </li>
            </ul>
          </div>

          <div class="col-md-4">
            <h5>Redes</h5>
            <div
              class="d-flex gap-3 justify-content-center justify-content-md-start"
            >
              <i class="bi bi-instagram fs-4"></i>
              <i class="bi bi-facebook fs-4"></i>
              <i class="bi bi-twitter-x fs-4"></i>
            </div>
          </div>
        </div>
        <hr />
        <p class="text-center mb-0">© 2026 PipElectronics</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
    <script type="module" src="js/admUsuarios.js"></script>
  </body>
</html>
