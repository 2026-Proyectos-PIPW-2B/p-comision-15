<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body class="d-flex flex-column min-vh-100 color-marcas">
    <div class="container-fluid p-0">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container-fluid mx-3">
                <a class="logo navbar-brand color-principal fw-bold" href="Inicio.html"> PipElectronics </a>
                <div class="align-items-center">
                    <a class="boton-link nav-link color-fuente-primario  fw-bold font-size-2"
                        href="admUsuarios.html">Administracion de los usuarios</a>
                </div>
                <div class="align-items-end">
                    <button class="boton-link btn color-principal " type="button" data-bs-toggle="modal"
                        data-bs-target="#exampleModal">
                        <i class="bi bi-person-circle"></i>
                    </button>
                    <a href="carrito.html">
                        <button type="button" class="boton-link btn color-principal">
                            <i class="bi bi-cart"></i>
                        </button>
                    </a>
                </div>
            </div>
        </nav>

        <main class="container flex-grow-1">
            <div class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        <div class="card shadow color-fondo-gris">
                            <div class="card-body p-4">
                                <h3 class="card-title text-center colorTexto mb-4">
                                    Alta de producto
                                </h3>
                                <form id="form-alta-producto" class="row justify-content-between">
                                    <div class="mb-3">
                                        <label for="inputNombre">Nombre del Producto</label>
                                        <input type="text" class="form-control rounded-3" id="inputNombre">
                                    </div>
                                    <div class="mb-3 col-5">
                                        <label for="inputCategoria" class="form-label">Categorias</label>
                                        <select id="inputCategoria" class="form-select">
                                            <option value="" disabled>Seleccionar una opcion</option>
                                            <option value="monitor">Monitor</option>
                                            <option value="perifericos">Perifericos</option>
                                            <option value="Celulares">Celulares</option>
                                        </select>
                                    </div>
                                    <div class="mb-3 col-5">
                                        <label for="inputMarca" class="form-label">Marcas</label>
                                        <select id="inputMarca" class="form-select">
                                            <option value="" disabled>Seleccionar una opcion</option>
                                            <option value="lg">LG</option>
                                            <option value="asus">Asus</option>
                                            <option value="Samsung">Samsung</option>
                                        </select>
                                    </div>
                                    <div class="mb-3 col-5">
                                        <label for="inputPrecio">Precio del producto</label>
                                        <input type="number" class="form-control rounded-3" id="inputPrecio">
                                    </div>
                                    <div class="mb-3 col-5">
                                        <label for="inputStock">Cantidad del stock</label>
                                        <input type="number" name="cantStock" id="inputStock"
                                            class="form-control rounded-3">

                                    </div>
                                    <div class="mb-3">
                                        <button class="w-100 mb-2 btn btn-lg rounded-3 text-white fondo-boton"
                                            type="button" id="botonCrearProducto">Crear Producto</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        <div class="card shadow color-fondo-gris">
                            <div class="card-body p-4">
                                <h3 class="card-title text-center colorTexto mb-4">
                                    Editar producto
                                </h3>
                                <form id="formRegistro" class="row justify-content-between">
                                    <div class="mb-3">
                                        <label for="editarProducto">Nombre del Producto</label>
                                        <input type="text" class="form-control rounded-3" id="editarProducto">
                                    </div>
                                    <div class="mb-3 col-5">
                                        <label for="categoriaProducto" class="form-label">Nueva categorias</label>
                                        <select id="inputCategoria" class="form-select">
                                            <option value="">Seleccionar una opcion</option>
                                            <option value="monitor">Monitor</option>
                                            <option value="perifericos">Perifericos</option>
                                            <option value="Celulares">Celulares</option>
                                        </select>
                                    </div>
                                    <div class="mb-3 col-5">
                                        <label for="stockProducto">Nueva cantidad del stock</label>
                                        <input type="number" name="cantStock" id="inputStock"
                                            class="form-control rounded-3">

                                    </div>
                                    <div class="mb-3">
                                        <button class="w-100 mb-2 btn btn-lg rounded-3 text-white fondo-boton"
                                            type="submit">Editar Producto</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container color-fondo-gris">
                <h2 class="color-principal">Listado de productos agregados</h2>
                <form action="">
                    <table class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Categoria</th>
                                <th>Marca</th>
                                <th>Cantidad</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="bodyTabla">

                        </tbody>
                    </table>
                </form>
            </div>
        </main>

        <footer id="footer" class="color-fondo text-white py-4">
            <div class="container">
                <div class="row text-center text-md-start">
                    <div class="col-md-4 mb-3">
                        <h5>PipElectronics</h5>
                        <p>La tienda electronica mas completa del pais</p>
                    </div>
                    <div class="col-md-4 mb-3">
                        <h5>Links</h5>
                        <ul class="list-unstyled">
                            <li>
                                <a href="inicio.html" class="text-white text-decoration-none">Inicio</a>
                            </li>
                            <li>
                                <a href="catalogo.html" class="text-white text-decoration-none">Productos</a>
                            </li>
                            <li>
                                <a href="carrito.html" class="text-white text-decoration-none">Carrito</a>
                            </li>
                        </ul>
                    </div>

                    <div class="col-md-4">
                        <h5>Redes</h5>
                        <div class="d-flex gap-3 justify-content-center justify-content-md-start">
                            <i class="bi bi-instagram fs-4"></i>
                            <i class="bi bi-facebook fs-4"></i>
                            <i class="bi bi-twitter-x fs-4"></i>
                        </div>
                    </div>
                </div>
                <hr />
                <p class="text-center mb-0">© 2026 PipElectronics</p>
            </div>
        </footer>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
        <script type="module" src="js/admProductos.js"></script>
</body>

</html>
